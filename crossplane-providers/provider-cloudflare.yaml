# Cloudflare provider — patched fork pending publish.
#
# Status (2026-04-03):
#   No production-ready xpkg exists in the Crossplane ecosystem.
#   Plan: fork wildbitca/provider-upjet-cloudflare, fix CEL bug in 4 CRDs,
#         publish to ghcr.io/stanleyxie/provider-upjet-cloudflare:v0.1.0-patched.
#
# CEL bug: wildbitca v0.1.0 has an invalid has() rule on a dyn-typed `value` field
#   in 4 CRD files (tls/zone settings). Fix: remove the 2-line validation rule.
#   Affected files in the fork:
#     package/crds/hostname.upjet-cloudflare.m.upbound.io_tlssettings.yaml
#     package/crds/hostname.upjet-cloudflare.upbound.io_tlssettings.yaml
#     package/crds/zone.upjet-cloudflare.m.upbound.io_settings.yaml
#     package/crds/zone.upjet-cloudflare.upbound.io_settings.yaml
#
# Long-term: switch to crossplane-contrib/provider-upjet-cloudflare when it publishes:
#   https://github.com/crossplane-contrib/provider-upjet-cloudflare/releases
#
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-cloudflare
spec:
  package: ghcr.io/stanleyxie/provider-upjet-cloudflare:v0.1.0-patched
  packagePullPolicy: IfNotPresent
  revisionActivationPolicy: Automatic
  runtimeConfigRef:
    name: default
