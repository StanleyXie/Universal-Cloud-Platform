# Shared platform Gateway — single entry point for all services
# Cilium acts as the Gateway controller via GatewayClass cilium
# Exposes HTTP on port 80; TLS termination can be added later
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: networking
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
