gitea:
  admin:
    username: stanley
    password: "changeme123!"
    email: stanley@local
  config:
    database:
      DB_TYPE: sqlite3
    cache:
      ADAPTER: memory
    queue:
      TYPE: level
    session:
      PROVIDER: memory

service:
  http:
    type: NodePort
    port: 3000
    nodePort: 30300
  ssh:
    type: NodePort
    port: 22
    nodePort: 30022

persistence:
  enabled: true
  storageClass: local-path
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Use SQLite3 - no external dependencies needed for homelab
redis-cluster:
  enabled: false
redis:
  enabled: false
postgresql:
  enabled: false
postgresql-ha:
  enabled: false
