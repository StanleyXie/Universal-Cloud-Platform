# Suppress expected policy violations for system-level workloads.
# kube-proxy, kube-vip, kube-scheduler, Cilium etc. legitimately require host
# namespaces, hostPath volumes, privileged mode, extra capabilities, and SELinux/seccomp
# relaxations to function. local-path-provisioner and Helm-managed platform components
# (ArgoCD, Crossplane providers) do not define resource limits by default.
# These are not security issues — they are system components or upstream Helm defaults.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kube-system-exception
  namespace: kyverno
spec:
  exceptions:
    - policyName: disallow-host-namespaces
      ruleNames:
        - host-namespaces
        - autogen-host-namespaces
    - policyName: disallow-host-path
      ruleNames:
        - host-path
        - autogen-host-path
    - policyName: disallow-privileged-containers
      ruleNames:
        - privileged-containers
        - autogen-privileged-containers
    - policyName: disallow-capabilities
      ruleNames:
        - adding-capabilities
        - autogen-adding-capabilities
    - policyName: disallow-host-ports
      ruleNames:
        - host-ports-none
        - autogen-host-ports-none
    - policyName: disallow-selinux
      ruleNames:
        - selinux-type
        - autogen-selinux-type
    - policyName: restrict-seccomp
      ruleNames:
        - check-seccomp
        - autogen-check-seccomp
    - policyName: require-resource-limits
      ruleNames:
        - check-container-limits
        - autogen-check-container-limits
  match:
    any:
      - resources:
          namespaces:
            - kube-system
            - local-path-storage
            - argocd
            - crossplane-system
            - monitoring
