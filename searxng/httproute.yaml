# HTTPRoute — routes search.aos.local to SearXNG service
# Attaches to the shared platform-gateway in the networking namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: searxng
  namespace: common-svc
spec:
  parentRefs:
    - name: platform-gateway
      namespace: networking
  hostnames:
    - "search.aos.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: searxng
          port: 8080
