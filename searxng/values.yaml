image:
  repository: searxng/searxng
  tag: "2026.4.3-53141be38"
  pullPolicy: IfNotPresent

env:
  INSTANCE_NAME: "AOS Search"
  BASE_URL: "http://search.aos.local/"
  AUTOCOMPLETE: "false"

controller:
  strategy: RollingUpdate

service:
  main:
    ports:
      http:
        port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

persistence:
  config:
    enabled: false

ingress:
  main:
    enabled: false

# secret_key is intentionally absent — mounted from searxng-secret k8s Secret
# at /etc/searxng/settings.yml, overriding this chart ConfigMap.
# Create the secret before deploying:
#   platform/scripts/setup-searxng-secret.sh
searxng:
  config:
    use_default_settings: true
    search:
      safe_search: 0
      autocomplete: ""
    ui:
      default_theme: simple
      default_language: "en"

# Mount the Secret (created by setup-searxng-secret.sh) over the chart ConfigMap
# The Secret contains a complete settings.yml including the generated secret_key
extraVolumes:
  - name: searxng-secret-settings
    secret:
      secretName: searxng-secret
      items:
        - key: settings.yml
          path: settings.yml

extraVolumeMounts:
  - name: searxng-secret-settings
    mountPath: /etc/searxng/settings.yml
    subPath: settings.yml
    readOnly: true

probes:
  readiness:
    custom: true
    spec:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
  liveness:
    custom: true
    spec:
      httpGet:
        path: /healthz
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 30
  startup:
    custom: true
    spec:
      httpGet:
        path: /healthz
        port: 8080
      failureThreshold: 30
      periodSeconds: 5

redis:
  enabled: false
