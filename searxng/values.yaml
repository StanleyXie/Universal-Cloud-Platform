image:
  repository: searxng/searxng
  tag: "2026.4.3-53141be38"
  pullPolicy: IfNotPresent

# Use existing secret created by scripts/setup-searxng-secret.sh
secret:
  create: false
  existingSecret: "searxng-secret"
  secretKey: "searxng-secret"

config:
  general:
    instance_name: "AOS Search"
    enable_metrics: false

  search:
    safe_search: 0
    autocomplete: ""

  server:
    limiter: false
    public_instance: false
    image_proxy: false
    method: "POST"
    base_url: "http://search.aos.local/"

  ui:
    default_theme: simple
    default_locale: "en"

  engines:
    - name: duckduckgo
      disabled: false
    - name: google
      disabled: false
    - name: wikipedia
      disabled: false
    - name: github
      disabled: false
    - name: stackoverflow
      disabled: false

# Gateway API HTTPRoute — native chart support
route:
  enabled: true
  parentRefs:
    - name: platform-gateway
      namespace: networking
  hostnames:
    - "search.aos.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

service:
  type: ClusterIP
  port: 8080

ingress:
  main:
    enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
